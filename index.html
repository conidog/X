<!-- X投稿イメージ メーカー（@McDonaldsJapan）— 単体 / ツリー / 引用RP -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>X投稿イメージ メーカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --mc-red:#DA291C; --mc-red-d:#b81f14; --mc-yellow:#FFC72C;
    --ink:#15171a; --muted2:#6b7280; --panel:#ffffff; --work:#f4f5f7;
    --line2:#e4e7eb; --field:#fff; --field-line:#d4d9df;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,"Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font);background:var(--work);color:var(--ink);-webkit-font-smoothing:antialiased;}

  /* ---- layout ---- */
  .app{display:flex;flex-direction:column;height:100vh;min-height:0;}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--mc-red);color:#fff;padding:12px 18px;flex:0 0 auto;}
  .topbar .logo{width:30px;height:30px;border-radius:8px;background:var(--mc-yellow);display:flex;align-items:center;justify-content:center;color:var(--mc-red);font-weight:900;font-size:20px;line-height:1;font-family:Georgia,serif;}
  .topbar h1{font-size:16px;font-weight:800;letter-spacing:.02em;margin:0;}
  .topbar .sub{font-size:12px;opacity:.85;margin-left:2px;}
  .topbar .spacer{flex:1;}

  .main{flex:1;display:flex;min-height:0;}
  .controls{width:392px;flex:0 0 auto;background:var(--panel);border-right:1px solid var(--line2);display:flex;flex-direction:column;min-height:0;}
  .preview{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;background:
     linear-gradient(0deg,rgba(0,0,0,.015),rgba(0,0,0,.015)),
     repeating-linear-gradient(45deg,#eceef1 0 2px,transparent 2px 14px);}

  /* ---- tabs ---- */
  .tabs{display:flex;gap:4px;padding:12px 14px 0;flex:0 0 auto;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:10px 10px 0 0;font-size:13px;font-weight:700;color:var(--muted2);background:transparent;border:1px solid transparent;border-bottom:none;cursor:pointer;}
  .tab.on{color:var(--mc-red);background:var(--work);border-color:var(--line2);}
  .tabs-rule{height:1px;background:var(--line2);margin:0 14px;}

  .scroll{overflow-y:auto;padding:14px;flex:1;min-height:0;}
  .scroll::-webkit-scrollbar{width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:#cdd2d8;border-radius:6px;border:2px solid var(--panel);}

  .group{border:1px solid var(--line2);border-radius:14px;padding:13px 13px 15px;margin-bottom:13px;background:#fff;}
  .group>.glabel{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--mc-red);text-transform:uppercase;margin:0 0 11px;display:flex;align-items:center;gap:7px;}
  .group>.glabel::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--mc-yellow);box-shadow:0 0 0 2px var(--mc-red);}

  label.f{display:block;font-size:11.5px;font-weight:700;color:var(--muted2);margin:0 0 5px;}
  .row{display:flex;gap:9px;}
  .row>div{flex:1;min-width:0;}
  .fld{margin-bottom:11px;}
  .fld:last-child{margin-bottom:0;}
  input[type=text],input[type=number],textarea,select{
    width:100%;font-family:var(--font);font-size:13.5px;color:var(--ink);
    background:var(--field);border:1px solid var(--field-line);border-radius:9px;padding:8px 10px;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--mc-red);box-shadow:0 0 0 3px rgba(218,41,28,.12);}
  textarea{resize:vertical;min-height:78px;line-height:1.5;}
  .handle-wrap{position:relative;}
  .handle-wrap span{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13.5px;pointer-events:none;}
  .handle-wrap input{padding-left:22px;}

  .seg{display:flex;background:var(--work);border:1px solid var(--field-line);border-radius:9px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:transparent;border-radius:6px;padding:7px 4px;font-size:12.5px;font-weight:700;color:var(--muted2);cursor:pointer;font-family:var(--font);}
  .seg button.on{background:#fff;color:var(--mc-red);box-shadow:0 1px 2px rgba(0,0,0,.08);}

  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  input[type=range].rng{width:100%;accent-color:var(--mc-red);margin:3px 0 0;cursor:pointer;}
  .rngval{color:var(--mc-red);font-weight:800;}
  .chk{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;user-select:none;}
  .chk input{width:16px;height:16px;accent-color:var(--mc-red);}

  .btn{font-family:var(--font);border:none;border-radius:9px;cursor:pointer;font-weight:700;}
  .btn-ghost{background:var(--work);color:var(--ink);border:1px solid var(--field-line);padding:8px 12px;font-size:12.5px;}
  .btn-ghost:hover{background:#eceef1;}
  .btn-red{background:var(--mc-red);color:#fff;padding:8px 12px;font-size:12.5px;}
  .btn-red:hover{background:var(--mc-red-d);}
  .btn-add{width:100%;padding:11px;border:1.5px dashed var(--field-line);background:#fff;color:var(--mc-red);font-size:13px;}
  .btn-add:hover{border-color:var(--mc-red);background:#fff7f6;}

  .avatar-ctrl{display:flex;align-items:center;gap:11px;}
  .avatar-ctrl .ava{width:46px;height:46px;border-radius:50%;object-fit:cover;border:1px solid var(--line2);flex:0 0 auto;background:#eee;}
  .avatar-ctrl .acts{display:flex;flex-direction:column;gap:6px;}

  .thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .thumb{position:relative;width:56px;height:56px;border-radius:9px;overflow:hidden;border:1px solid var(--line2);}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb-loading{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#9aa3ab;font-size:18px;}
  .thumb button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.65);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .hint{font-size:11px;color:var(--muted2);margin:7px 0 0;line-height:1.5;}

  .thread-item{border:1px solid var(--line2);border-radius:13px;padding:12px;margin-bottom:11px;background:#fff;position:relative;}
  .thread-item .tnum{position:absolute;top:-9px;left:13px;background:var(--mc-red);color:#fff;font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:.04em;}
  .thread-item .trm{position:absolute;top:9px;right:10px;}
  .trm-btn{border:none;background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;font-weight:700;}
  .trm-btn:hover{color:var(--mc-red);}
  .divider{height:1px;background:var(--line2);margin:13px 0;}
  .sub-label{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--muted2);text-transform:uppercase;margin:0 0 9px;}

  /* ---- preview stage ---- */
  .pv-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);border-bottom:1px solid var(--line2);flex:0 0 auto;}
  .pv-bar .t{font-size:12.5px;font-weight:700;color:var(--muted2);}
  .pv-bar .spacer{flex:1;}
  .pv-scroll{flex:1;overflow:auto;padding:24px 16px 40px;min-height:0;}
  /* export modal */
  .dlmodal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;}
  .dlmodal.on{display:flex;}
  .dlbox{background:#fff;border-radius:16px;width:min(420px,92vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .dlhead{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;font-weight:800;font-size:14px;border-bottom:1px solid var(--line2);}
  .dlclose{border:none;background:transparent;font-size:22px;line-height:1;color:var(--muted2);cursor:pointer;}
  .dlimgwrap{overflow:auto;padding:14px;background:repeating-conic-gradient(#eef0f2 0% 25%, #fff 0% 50%) 50%/20px 20px;text-align:center;}
  .dlimgwrap img{max-width:100%;max-height:64vh;width:auto;height:auto;object-fit:contain;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.18);display:inline-block;}
  .dlmsg{display:none;padding:26px 18px;color:#33414d;font-size:13.5px;font-weight:700;line-height:1.7;}
  .dlactions{display:flex;gap:9px;padding:13px 16px 4px;}
  .dlactions .btn{flex:1;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;}
  .dlhint{font-size:11px;color:var(--muted2);padding:8px 16px 15px;margin:0;line-height:1.6;}
  .stage{display:flex;justify-content:center;transform-origin:top center;}
  #capture{display:inline-block;}
  /* device frame */
  .bezel{background:#0b0b0c;padding:13px;border-radius:54px;box-shadow:0 18px 50px rgba(0,0,0,.28), inset 0 0 0 2px #2b2b2e;}
  .screen{width:390px;height:844px;overflow:hidden;border-radius:44px;background:var(--bg);position:relative;}
  #capture.noframe .screen{border-radius:22px;box-shadow:0 6px 26px rgba(0,0,0,.14);border:1px solid var(--border);}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:104px;height:29px;background:#000;border-radius:16px;z-index:6;}
  #capture.noframe .island{display:none;}
  /* status bar */
  .statusbar{display:flex;align-items:center;justify-content:space-between;padding:15px 27px 7px;color:var(--text);font-size:14.5px;font-weight:700;letter-spacing:.01em;}
  .statusbar .sb-r{display:flex;align-items:center;gap:6px;}
  .statusbar svg{display:block;fill:currentColor;}
  /* X home header */
  .x-header{display:flex;align-items:center;justify-content:space-between;padding:13px 17px 4px;}
  .x-header .h-ava{width:31px;height:31px;border-radius:50%;background-color:#c4ccd4;background-size:cover;background-position:center;}
  .x-header .h-logo svg{width:27px;height:27px;fill:var(--text);display:block;}
  .x-header .h-set svg{width:23px;height:23px;fill:var(--text);display:block;}
  /* おすすめ / フォロー中 tabs */
  .x-tabs{display:flex;border-bottom:1px solid var(--border);}
  .x-tab{flex:1;text-align:center;position:relative;padding:14px 0 9px;font-size:13px;font-weight:600;color:var(--muted);}
  .x-tab.on{color:var(--text);font-weight:800;}
  .x-tab.on::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:56px;height:3px;border-radius:4px;background:var(--blue);}
  .feed{padding:14px 12px 88px;}
  /* compose FAB */
  .fab{position:absolute;right:16px;bottom:94px;width:54px;height:54px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.28);z-index:5;}
  .fab svg{width:24px;height:24px;fill:#fff;display:block;}
  /* bottom bar pinned to screen bottom */
  .botwrap{position:absolute;left:0;right:0;bottom:0;background:var(--bg);z-index:4;}
  .bottomnav{display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--border);padding:11px 12px 7px;}
  .bottomnav>div{display:flex;}
  .bottomnav svg{width:25px;height:25px;fill:var(--muted);display:block;}
  .bottomnav .active svg{fill:var(--text);}
  .homebar{height:5px;width:134px;background:var(--text);opacity:.92;border-radius:3px;margin:4px auto 9px;}
  #capture.noframe .homebar{display:none;}

  /* ---- X post (faithful) ---- */
  .tw{ --bg:#fff; --text:#0f1419; --muted:#536471; --border:rgb(239,243,244); --line:#cfd9de; --blue:#1d9bf0; --cardline:#e6e9ea; --name-size:15px; --text-size:15px; }
  .tw.dark{ --bg:#000; --text:#e7e9ea; --muted:#71767b; --border:#2f3336; --line:#3a3f43; --blue:#1d9bf0; --cardline:#2f3336; }
  .tw{color:var(--text);}
  .tw-post{display:flex;}
  .tw-left{flex:0 0 40px;display:flex;flex-direction:column;align-items:center;margin-right:12px;}
  .tw-avatar{width:40px;height:40px;border-radius:50%;background-color:#ddd;background-size:cover;background-position:center;flex:0 0 auto;}
  .tw-avatar.sq{border-radius:9px;}
  .tw-line{width:2px;background:var(--line);flex:1;margin-top:4px;border-radius:2px;}
  .tw-body{flex:1;min-width:0;padding-bottom:12px;}
  .tw-post:last-child .tw-body{padding-bottom:2px;}
  .tw-head{display:flex;align-items:center;flex-wrap:nowrap;gap:2px;line-height:1.3;}
  .tw-name{font-weight:700;font-size:var(--name-size);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0;}
  .tw-handle,.tw-dot,.tw-time{color:var(--muted);font-size:var(--name-size);}
  .tw-handle{margin-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:3;min-width:0;}
  .tw-dot,.tw-time{flex:0 0 auto;white-space:nowrap;}
  .tw-dot{margin:0 2px;}
  .tw-more{margin-left:auto;padding-left:8px;color:var(--muted);display:flex;flex:0 0 auto;}
  .tw-more svg{width:18.75px;height:18.75px;fill:currentColor;}
  .tw-badge{display:inline-flex;margin-left:1px;flex:0 0 auto;}
  .tw-badge svg{width:19px;height:19px;}
  .tw-text{font-size:var(--text-size);line-height:1.45;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-top:2px;}
  .tw-text a{color:var(--blue);text-decoration:none;}
  .tw-text:empty{display:none;}
  #capture.hide-text .tw-text{visibility:hidden;}
  #capture.exporting .bezel{box-shadow:inset 0 0 0 2px #2b2b2e;}
  #capture.exporting.noframe .screen{box-shadow:none;}
  #capture.pptx-bg .tw-text,#capture.pptx-bg .tw-media,#capture.pptx-bg .tw-actions,#capture.pptx-bg .tw-quote .qtext{visibility:hidden;}
  .arch-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .arch-item{display:flex;align-items:center;gap:8px;justify-content:space-between;border:1px solid var(--border);border-radius:10px;padding:8px 10px;background:#fff;}
  .arch-meta{min-width:0;flex:1;}
  .arch-name{font-size:12.5px;font-weight:700;color:#0f1419;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .arch-sub{font-size:11px;color:#536471;margin-top:2px;}
  .arch-btns{display:flex;gap:6px;flex:0 0 auto;}
  .arch-btns .btn{padding:5px 10px;font-size:12px;}

  .tw-media{margin-top:12px;border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;}
  .tw-media.n1 img{width:100%;height:auto;display:block;}
  .tw-grid{position:relative;width:100%;height:200px;background:var(--bg);}
  .tw-cell{position:absolute;background-color:#e8e8e8;background-size:cover;background-position:center;border:1px solid var(--bg);}
  /* 2 images: two equal columns */
  .g2 .c1{left:0;top:0;width:50%;height:100%;}
  .g2 .c2{left:50%;top:0;width:50%;height:100%;}
  /* 3 images: left tall + two stacked right (X spec) */
  .g3 .c1{left:0;top:0;width:50%;height:100%;}
  .g3 .c2{left:50%;top:0;width:50%;height:50%;}
  .g3 .c3{left:50%;top:50%;width:50%;height:50%;}
  /* 4 images: 2x2 */
  .g4 .c1{left:0;top:0;width:50%;height:50%;}
  .g4 .c2{left:50%;top:0;width:50%;height:50%;}
  .g4 .c3{left:0;top:50%;width:50%;height:50%;}
  .g4 .c4{left:50%;top:50%;width:50%;height:50%;}
  .tw-video{position:relative;}
  .tw-video img,.tw-video video{width:100%;height:auto;display:block;}
  .tw-vph{width:100%;height:200px;background:#cfd9de;display:flex;align-items:center;justify-content:center;color:#5b6b78;font-size:13px;font-weight:700;}
  .tw-vph-dark{background:linear-gradient(135deg,#10151a 0%,#2a333b 100%);}
  .tw-playwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .tw-play{width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;}
  .tw-play svg{width:24px;height:24px;fill:#fff;margin-left:3px;}
  .tw-vdur{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.6);color:#fff;font-size:12.5px;font-weight:700;padding:1px 7px;border-radius:5px;line-height:1.5;}

  .tw-quote{margin-top:12px;border:1px solid var(--cardline);border-radius:16px;overflow:hidden;}
  .tw-quote .qhead{display:flex;align-items:center;gap:4px;padding:9px 12px 1px;flex-wrap:wrap;}
  .tw-quote .qava{width:20px;height:20px;border-radius:50%;background-color:#ddd;background-size:cover;background-position:center;flex:0 0 auto;}
  .tw-quote .qava.sq{border-radius:5px;}
  .tw-quote .qname{font-weight:700;font-size:14px;color:var(--text);}
  .tw-quote .qhandle,.tw-quote .qdot,.tw-quote .qtime{color:var(--muted);font-size:14px;}
  .tw-quote .qbadge svg{width:16px;height:16px;}
  .tw-quote .qtext{font-size:14px;line-height:1.4;color:var(--text);white-space:pre-wrap;word-break:break-word;padding:2px 12px 11px;}
  .tw-quote .qtext:empty{padding-bottom:11px;}
  .tw-quote img.qmedia{width:100%;height:auto;display:block;}

  .tw-actions{display:flex;align-items:center;justify-content:space-between;max-width:430px;margin-top:12px;color:var(--muted);}
  .act{display:flex;align-items:center;gap:6px;font-size:13px;}
  .act svg{width:18.75px;height:18.75px;fill:currentColor;}
  .act-grp{display:flex;gap:2px;}
  .act-grp .act{padding:0;}

  @media(max-width:880px){
    .main{flex-direction:column;}
    .controls{width:100%;border-right:none;border-bottom:1px solid var(--line2);max-height:54vh;}
    .preview{min-height:46vh;}
  }
</style>

<div class="app">
  <div class="topbar">
    <div class="logo">M</div>
    <div>
      <h1>X投稿イメージ メーカー</h1>
      <div class="sub">@McDonaldsJapan ／ スマホ表示プレビュー（単体・ツリー・引用RP）</div>
    </div>
    <div class="spacer"></div>
  </div>

  <div class="main">
    <div class="controls">
      <div class="tabs" id="tabs">
        <button class="tab" data-mode="single">単体投稿</button>
        <button class="tab" data-mode="thread">ツリー</button>
        <button class="tab" data-mode="quote">引用RP</button>
      </div>
      <div class="tabs-rule"></div>
      <div class="scroll" id="editor"></div>
    </div>

    <div class="preview">
      <div class="pv-bar">
        <div class="t">プレビュー</div>
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="zoomBtn">原寸表示</button>
        <button class="btn btn-ghost" id="pptBtn">PPTX（投稿文編集可）</button>
        <button class="btn btn-red" id="dlBtn">画像を保存（PNG）</button>
      </div>
      <div class="pv-scroll" id="pvScroll">
        <div class="stage" id="stage">
          <div id="capture" class="tw"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="dlmodal" id="dlModal">
  <div class="dlbox">
    <div class="dlhead"><span>書き出し完了</span><button class="dlclose" id="dlClose">×</button></div>
    <div class="dlimgwrap"><img id="dlImg" alt="生成画像"><div id="dlMsg" class="dlmsg">PPTXファイルを生成しました。下の「ダウンロード」から保存してください。</div></div>
    <div class="dlactions">
      <a class="btn btn-red" id="dlSave" download>ダウンロード</a>
      <button class="btn btn-ghost" id="dlCopy">画像をコピー</button>
      <a class="btn btn-ghost" id="dlOpen" target="_blank" rel="noopener">新しいタブで開く</a>
    </div>
    <p class="dlhint">保存できない場合：画像を右クリック→「画像を保存」、スマホは長押しで保存。PPTXは「新しいタブで開く」から保存してください。</p>
  </div>
</div>

<script>
/* ============================ icons ============================ */

/* ============================ helpers ============================ */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(s){
  let h = esc(s);
  h = h.replace(/(https?:\/\/[^\s<]+)/g,'<a>$1</a>');
  h = h.replace(/([#＃][^\s<#＃]+)/g,'<a>$1</a>');
  h = h.replace(/(^|[\s(])([@＠][A-Za-z0-9_]+)/g,'$1<a>$2</a>');
  return h;
}
function fmt(n){
  n = Number(n)||0;
  if(n<10000) return n.toLocaleString('ja-JP');
  const man=Math.floor(n/1000)/10;          // floor to 1 decimal place
  return (Number.isInteger(man)? man : man.toFixed(1)) + '万';
}

/* ============================ archive (drafts) ============================ */
const ARCH_KEY='xmock_archives_v1';
const _mem={};
const Store={
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return _mem[k]!==undefined?_mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } }
};
let archives=[];
function loadArchives(){ try{ archives=JSON.parse(Store.get(ARCH_KEY)||'[]')||[]; }catch(e){ archives=[]; } }
function persistArchives(){ Store.set(ARCH_KEY, JSON.stringify(archives)); }
function snapshot(){
  return {
    mode:state.mode, theme:state.theme, showStats:state.showStats, device:state.device,
    chrome:state.chrome, statusTime:state.statusTime, homeTab:state.homeTab,
    nameSize:state.nameSize, textSize:state.textSize,
    account:JSON.parse(JSON.stringify(state.account)),
    posts:JSON.parse(JSON.stringify(state.posts)),
    quoted:JSON.parse(JSON.stringify(state.quoted))
  };
}
function applySnapshot(d){
  state.mode=d.mode; state.theme=d.theme; state.showStats=d.showStats; state.device=d.device;
  state.chrome=d.chrome; state.statusTime=d.statusTime; state.homeTab=d.homeTab;
  state.nameSize=d.nameSize; state.textSize=d.textSize;
  state.account=JSON.parse(JSON.stringify(d.account));
  state.posts=JSON.parse(JSON.stringify(d.posts));
  state.quoted=JSON.parse(JSON.stringify(d.quoted));
}
function archiveLabel(){
  const t=((state.posts[0]&&state.posts[0].text)||'').trim().replace(/\s+/g,' ');
  return t ? t.slice(0,24) : '（無題の投稿案）';
}
function saveCurrentDraft(){
  const id='a'+Date.now()+Math.floor(Math.random()*1000);
  const d=new Date();
  const p2=n=>String(n).padStart(2,'0');
  const ts=d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
  archives.unshift({ id, ts, label:archiveLabel(), mode:state.mode, data:snapshot() });
  persistArchives();
}
function deleteArchive(id){ archives=archives.filter(a=>a.id!==id); persistArchives(); }
function restoreArchive(id){ const a=archives.find(x=>x.id===id); if(a){ applySnapshot(a.data); renderEditor(); } }

/* ============================ preview render ============================ */
function avatarDiv(url, cls){ return '<div class="'+cls+'" style="background-image:url(\''+url+'\')"></div>'; }
function mediaHTML(images){
  if(!images||!images.length) return '';
  const n=Math.min(images.length,4);
  if(n===1) return '<div class="tw-media n1"><img src="'+images[0]+'"></div>';
  let cells='';
  for(let k=0;k<n;k++) cells+='<div class="tw-cell c'+(k+1)+'" style="background-image:url(\''+images[k]+'\')"></div>';
  return '<div class="tw-media"><div class="tw-grid g'+n+'">'+cells+'</div></div>';
}
function videoMediaHTML(vid){
  const play='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const dur = vid.duration?'<div class="tw-vdur">'+esc(vid.duration)+'</div>':'';
  let inner, showPlay=true, showExtra=true;
  if(vid.poster){ inner='<img src="'+vid.poster+'">'; }
  else if(vid.loading){ inner='<div class="tw-vph"><span>サムネイル読み込み中…</span></div>'; showPlay=false; showExtra=false; }
  else { inner='<div class="tw-vph tw-vph-dark"></div>'; }
  return '<div class="tw-media tw-video">'
    + inner
    + (showPlay?'<div class="tw-playwrap"><div class="tw-play">'+play+'</div></div>':'')
    + (showExtra?dur:'') + '</div>';
}
function mediaBlock(p){
  if(p.video&&(p.video.poster||p.video.url)) return videoMediaHTML(p.video);
  return mediaHTML(p.images);
}
function quoteCardHTML(){
  const q=state.quoted;
  const ava=q.avatar||DEFAULT_QAVATAR;
  const avaCls='qava'+(q.badge==='gold'?' sq':'');
  const media = q.image?'<img class="qmedia" src="'+q.image+'">':'';
  return '<div class="tw-quote">'
    + '<div class="qhead">'+avatarDiv(ava,avaCls)
    + '<span class="qname">'+esc(q.name)+'</span>'+badgeSVG(q.badge,true)
    + '<span class="qhandle">@'+esc(q.handle)+'</span><span class="qdot">·</span><span class="qtime">'+esc(q.time)+'</span></div>'
    + '<div class="qtext">'+linkify(q.text)+'</div>'
    + media + '</div>';
}

/* ============================ image utils ============================ */
function readFiles(files, cb){
  const arr=Array.from(files); let out=[]; let done=0;
  if(!arr.length){cb([]);return;}
  arr.forEach((f,i)=>{
    const r=new FileReader();
    r.onload=e=>{ out[i]=e.target.result; if(++done===arr.length) cb(out); };
    r.onerror=()=>{ if(++done===arr.length) cb(out.filter(Boolean)); };
    r.readAsDataURL(f);
  });
}
function fmtDur(s){ if(!isFinite(s)||s<=0) return ''; s=Math.round(s); const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
function loadVideoPoster(file, cb){
  const url=URL.createObjectURL(file);
  const v=document.createElement('video');
  v.muted=true; v.defaultMuted=true; v.playsInline=true; v.preload='auto';
  v.setAttribute('muted',''); v.setAttribute('playsinline','');
  // keep on-page (tiny, near-transparent) so frames actually decode
  v.style.cssText='position:fixed;left:0;bottom:0;width:2px;height:2px;opacity:0.01;z-index:-1;pointer-events:none;';
  document.body.appendChild(v);

  let done=false, idx=0, last=null;
  const times=[0, 0.05, 0.15, 0.4, 0.8];   // first frame first; advance only if blank/undecoded
  const cleanup=()=>{ try{URL.revokeObjectURL(url);}catch(e){} try{v.pause();}catch(e){} try{v.remove();}catch(e){} };
  const finish=res=>{ if(done) return; done=true; cleanup(); cb(res); };

  const capture=()=>{
    const w=v.videoWidth, h=v.videoHeight;
    if(!w||!h) return null;
    try{
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.drawImage(v,0,0,w,h);
      let blank=false;
      try{ // near-black frame? (e.g. fade-in / not yet painted)
        const n=Math.min(w,40), m=Math.min(h,40);
        const s=ctx.getImageData(0,0,n,m).data; let sum=0;
        for(let i=0;i<s.length;i+=4) sum+=s[i]+s[i+1]+s[i+2];
        blank=(sum/(s.length/4*3))<4;
      }catch(_){}
      return { data:c.toDataURL('image/jpeg',0.92), blank };
    }catch(e){ return null; }
  };
  const afterPaint=fn=>{
    if(v.requestVideoFrameCallback){ try{ v.requestVideoFrameCallback(()=>fn()); return; }catch(_){} }
    setTimeout(fn,120);
  };
  const onFrame=()=>{
    if(done) return;
    const r=capture();
    if(r){ last=r; if(!r.blank){ finish({poster:r.data, duration:fmtDur(v.duration)}); return; } }
    idx++;
    if(idx>=times.length){ finish(last?{poster:last.data, duration:fmtDur(v.duration)}:null); return; }
    seekNext();
  };
  const seekNext=()=>{
    if(done) return;
    const d=v.duration; let t=times[idx];
    if(isFinite(d)&&d>0) t=Math.min(t, Math.max(0,d-0.05));
    const onSeeked=()=>{ v.removeEventListener('seeked',onSeeked); afterPaint(onFrame); };
    v.addEventListener('seeked',onSeeked);
    try{ v.currentTime=t; }catch(e){ afterPaint(onFrame); }
  };

  v.addEventListener('loadeddata', ()=>{
    // nudge the decoder to paint a frame, then capture the first cut
    try{ const p=v.play(); if(p&&p.catch) p.catch(()=>{}); }catch(_){}
    setTimeout(()=>{ try{v.pause();}catch(_){} }, 50);
    seekNext();
  }, {once:true});
  v.addEventListener('error', ()=>finish(null), {once:true});
  // hard safety: grab whatever is decoded, else give up
  setTimeout(()=>{ if(!done){ const r=capture(); finish(r?{poster:r.data, duration:fmtDur(v.duration)}:null); } }, 12000);
  v.src=url;
  try{ v.load(); }catch(e){}
}

/* ============================ wiring ============================ */
function wireEditor(){
  // account
  bind('#ac_name','input',e=>{state.account.name=e.target.value;renderPreview();});
  bind('#ac_handle','input',e=>{state.account.handle=e.target.value.replace(/^@/,'');renderPreview();});
  bind('#ac_ava_btn','click',()=>document.getElementById('ac_ava_file').click());
  bind('#ac_ava_clr','click',()=>{state.account.avatar=null;renderEditor();});
  bind('#ac_ava_file','change',e=>readFiles(e.target.files,a=>{if(a[0]){state.account.avatar=a[0];renderEditor();}}));
  segWire('#ac_badge',v=>{state.account.badge=v;renderEditor();});
  // display
  segWire('#dp_theme',v=>{state.theme=v;renderEditor();});
  bind('#dp_stats','change',e=>{state.showStats=e.target.checked;renderEditor();});
  bind('#dp_device','change',e=>{state.device=e.target.checked;renderPreview();});
  bind('#dp_chrome','change',e=>{state.chrome=e.target.checked;renderPreview();});
  segWire('#dp_hometab',v=>{state.homeTab=v;renderPreview();});
  bind('#dp_time','input',e=>{state.statusTime=e.target.value;renderPreview();});
  bind('#sz_name','input',e=>{state.nameSize=+e.target.value;document.getElementById('sz_name_v').textContent=e.target.value+'px';renderPreview();});
  bind('#sz_text','input',e=>{state.textSize=+e.target.value;document.getElementById('sz_text_v').textContent=e.target.value+'px';renderPreview();});
  // archive
  bind('#arch_save','click',()=>{ saveCurrentDraft(); renderEditor(); });
  editor.querySelectorAll('.arch-load').forEach(b=>b.addEventListener('click',()=>restoreArchive(b.dataset.id)));
  editor.querySelectorAll('.arch-del').forEach(b=>b.addEventListener('click',()=>{ deleteArchive(b.dataset.id); renderEditor(); }));

  // generic per-post fields (text/number/time)
  editor.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('input',e=>{
      const i=+el.dataset.i, f=el.dataset.f;
      let v=el.value; if(el.type==='number') v=v===''?0:+v;
      state.posts[i][f]=v; renderPreview();
    });
  });
  // image add
  editor.querySelectorAll('[data-addimg]').forEach(btn=>{
    const i=+btn.dataset.addimg;
    btn.addEventListener('click',()=>editor.querySelector('[data-imgfile="'+i+'"]').click());
  });
  editor.querySelectorAll('[data-imgfile]').forEach(inp=>{
    const i=+inp.dataset.imgfile;
    inp.addEventListener('change',e=>readFiles(e.target.files,arr=>{
      state.posts[i].images=state.posts[i].images.concat(arr).slice(0,4); renderEditor();
    }));
  });
  editor.querySelectorAll('[data-rm]').forEach(b=>{
    b.addEventListener('click',()=>{
      const i=+b.dataset.rm,k=+b.dataset.k;
      state.posts[i].images.splice(k,1); renderEditor();
    });
  });
  // video
  editor.querySelectorAll('[data-addvid]').forEach(btn=>{

  });
  // thread
  bind('#th_add','click',()=>{ if(state.posts.length<10){ state.posts.push(newPost()); renderEditor(); }});
  editor.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click',()=>{ state.posts.splice(+b.dataset.del,1); renderEditor(); });

  bind('#q_name','input',e=>{state.quoted.name=e.target.value;renderPreview();});
  bind('#q_handle','input',e=>{state.quoted.handle=e.target.value.replace(/^@/,'');renderPreview();});
  bind('#q_time','input',e=>{state.quoted.time=e.target.value;renderPreview();});

/* ============================ download ============================ */
let lastURL=null, lastFname='xpost.png';
function raf2(){ return new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r))); }
function dataURLtoBlob(durl){
  const parts=durl.split(','); const mime=(parts[0].match(/:(.*?);/)||[])[1]||'image/png';
  const bin=atob(parts[1]); const len=bin.length; const u8=new Uint8Array(len);
  for(let i=0;i<len;i++) u8[i]=bin.charCodeAt(i);
  return new Blob([u8],{type:mime});
}
function triggerDownload(url, filename){
  try{
    let href=url, revoke=null;
    if(url.indexOf('data:')===0){ const b=dataURLtoBlob(url); href=URL.createObjectURL(b); revoke=href; }
    const a=document.createElement('a'); a.href=href; a.download=filename; a.style.display='none';
    document.body.appendChild(a); a.click(); a.remove();
    if(revoke) setTimeout(()=>URL.revokeObjectURL(revoke),5000);
  }catch(e){ try{ window.open(url,'_blank'); }catch(_){} }
}

// Render the live node to PNG by drawing it through an <svg><foreignObject>.
// This uses the browser's own rendering, so the export matches the preview exactly.
function nodeToPNG(node, w, h, scale){
  return new Promise((resolve,reject)=>{
    const clone=node.cloneNode(true);
    clone.style.transform='none';
    // replace any live <video> (no poster yet) with a neutral placeholder so the SVG renders
    clone.querySelectorAll('video').forEach(vd=>{
      const ph=document.createElement('div'); ph.className='tw-vph';
      if(vd.parentNode) vd.parentNode.replaceChild(ph, vd);
    });
    const cssText=Array.from(document.querySelectorAll('style')).map(s=>s.textContent).join('\n');
    const serialized=new XMLSerializer().serializeToString(clone);
    const wrapper='<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;background:transparent;">'
      +'<style>'+cssText+'</style>'+serialized+'</div>';
    const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
      +'<foreignObject x="0" y="0" width="'+w+'" height="'+h+'">'+wrapper+'</foreignObject></svg>';
    let dataUri;
    try{ dataUri='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg))); }
    catch(e){ reject(e); return; }
    const img=new Image();
    img.onload=()=>{
      try{
        const c=document.createElement('canvas'); c.width=Math.round(w*scale); c.height=Math.round(h*scale);
        const ctx=c.getContext('2d'); ctx.setTransform(scale,0,0,scale,0,0);
        ctx.drawImage(img,0,0);
        resolve(c.toDataURL('image/png'));
      }catch(err){ reject(err); }
    };
    img.onerror=()=>reject(new Error('svg image failed to load'));
    img.src=dataUri;
  });
}

let currentObjURL=null;
function showSaveModal(url, fname, imgUrl){
  lastURL=url; lastFname=fname;
  // build a blob object URL so the real <a download> / new-tab link work without scripted downloads
  let blobURL=url;
  try{
    const blob = url.indexOf('data:')===0 ? dataURLtoBlob(url) : null;
    if(blob){ if(currentObjURL) URL.revokeObjectURL(currentObjURL); blobURL=URL.createObjectURL(blob); currentObjURL=blobURL; }
  }catch(e){ console.warn(e); }
  const save=document.getElementById('dlSave'); save.href=blobURL; save.setAttribute('download', fname);
  const open=document.getElementById('dlOpen'); open.href=blobURL;
  const img=document.getElementById('dlImg'), msg=document.getElementById('dlMsg'), copy=document.getElementById('dlCopy');
  if(imgUrl){ img.src=imgUrl; img.style.display=''; msg.style.display='none'; copy.style.display=''; }
  else { img.removeAttribute('src'); img.style.display='none'; msg.style.display='block'; copy.style.display='none'; }
  document.getElementById('dlModal').classList.add('on');
}
document.getElementById('dlBtn').addEventListener('click',async function(){
  const btn=this; const card=document.getElementById('capture');
  const prevT=card.style.transform; const prevLabel=btn.textContent;
  btn.disabled=true; btn.textContent='書き出し中…';
  card.style.transform='none';
  card.classList.add('exporting');
  await raf2();
  const w=card.offsetWidth, h=card.offsetHeight;
  let url=null;
  // primary: faithful SVG rendering
  try{ url=await nodeToPNG(card, w, h, 3); }
  catch(e){ console.warn('foreignObject export failed, trying html2canvas', e); }
  // fallback: html2canvas (no forced window dims — let it measure the element)
  if(!url && typeof html2canvas==='function'){
    try{
      const canvas=await html2canvas(card,{scale:3, useCORS:true, backgroundColor:null, logging:false});
      url=canvas.toDataURL('image/png');
    }catch(e){ console.error(e); }
  }
  card.classList.remove('exporting');
  card.style.transform=prevT; fitPreview();

  if(!url){ alert('画像の書き出しに失敗しました。お手数ですが、もう一度お試しください。'); btn.disabled=false; btn.textContent=prevLabel; return; }
  const fname='xpost_McDonaldsJapan_'+state.mode+'.png';
  showSaveModal(url, fname, url);
  btn.disabled=false; btn.textContent=prevLabel;
});
document.getElementById('dlCopy').addEventListener('click',async function(){
  try{
    if(!currentObjURL) throw new Error('no image');
    const blob=await (await fetch(currentObjURL)).blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type||'image/png']:blob})]);
    this.textContent='コピーしました'; setTimeout(()=>this.textContent='画像をコピー',1600);
  }catch(e){ console.error(e); this.textContent='コピー不可（右クリック保存を）'; setTimeout(()=>this.textContent='画像をコピー',2200); }
});

function pptParaXml(line, hex, szHnd, lhPct, face){

  let runs='';

  }else{
    parts.forEach(p=>{
      const isEnt=/^(https?:\/\/|[#＃]|[@＠])/.test(p);
      const col=isEnt?'1D9BF0':hex;
      runs+='<a:r><a:rPr lang="ja-JP" sz="'+szHnd+'" dirty="0"><a:solidFill><a:srgbClr val="'+col+'"/></a:solidFill>'
        +'<a:latin typeface="'+face+'"/><a:ea typeface="'+face+'"/><a:cs typeface="'+face+'"/></a:rPr><a:t>'+xmlEsc(p)+'</a:t></a:r>';
    });
  }
  return '<a:p><a:pPr><a:lnSpc><a:spcPct val="'+lhPct+'"/></a:lnSpc></a:pPr>'+runs+'</a:p>';
}

    clone.querySelectorAll('video').forEach(v=>{ const ph=document.createElement('div'); ph.className='tw-vph'; if(v.parentNode) v.parentNode.replaceChild(ph,v); });
    const cssText=Array.from(document.querySelectorAll('style')).map(s=>s.textContent).join('\n');
    const themeCls='tw'+(state.theme==='dark'?' dark':'');
    const serialized=new XMLSerializer().serializeToString(clone);
    const wrap='<div xmlns="http://www.w3.org/1999/xhtml" class="'+themeCls+'" style="width:'+w+'px;background:transparent;--name-size:'+state.nameSize+'px;--text-size:'+state.textSize+'px;">'
      +'<style>'+cssText+'</style>'+serialized+'</div>';
    const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'"><foreignObject x="0" y="0" width="'+w+'" height="'+h+'">'+wrap+'</foreignObject></svg>';
    let dataUri; try{ dataUri='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg))); }catch(e){ reject(e); return; }
    const img=new Image();
    img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=w*3; c.height=h*3; const ctx=c.getContext('2d'); ctx.setTransform(3,0,0,3,0,0); ctx.drawImage(img,0,0); resolve(c.toDataURL('image/png')); }catch(err){ reject(err); } };
    img.onerror=()=>reject(new Error('element svg failed'));
    img.src=dataUri;
  });
}
function pptBgPicXml(id, W, H, rId){
  return '<p:pic><p:nvPicPr><p:cNvPr id="'+id+'" name="背景"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr>'
    +'<p:blipFill><a:blip r:embed="'+rId+'"/><a:stretch><a:fillRect/></a:stretch></p:blipFill>'
    +'<p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+W+'" cy="'+H+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic>';
}
function pptGroupPicXml(gid, pid, o, rId){
  const x=Math.round(o.x*EMU), y=Math.round(o.y*EMU), cx=Math.round(o.w*EMU), cy=Math.round(o.h*EMU);
  return '<p:grpSp><p:nvGrpSpPr><p:cNvPr id="'+gid+'" name="'+o.name+'"/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>'
    +'<p:grpSpPr><a:xfrm><a:off x="'+x+'" y="'+y+'"/><a:ext cx="'+cx+'" cy="'+cy+'"/><a:chOff x="0" y="0"/><a:chExt cx="'+cx+'" cy="'+cy+'"/></a:xfrm></p:grpSpPr>'
    +'<p:pic><p:nvPicPr><p:cNvPr id="'+pid+'" name="'+o.name+'_img"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr>'
    +'<p:blipFill><a:blip r:embed="'+rId+'"/><a:stretch><a:fillRect/></a:stretch></p:blipFill>'
    +'<p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:grpSp>';
}
async function buildPptx(bgPng, wPx, hPx, boxes, overlays, face){
  const W=Math.round(wPx*EMU), H=Math.round(hPx*EMU);
  const nOv=overlays.length;
  const presentation='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" saveSubsetFonts="1">'
    +'<p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rId1"/></p:sldMasterIdLst>'
    +'<p:sldIdLst><p:sldId id="256" r:id="rId2"/></p:sldIdLst>'
    +'<p:sldSz cx="'+W+'" cy="'+H+'"/><p:notesSz cx="6858000" cy="9144000"/></p:presentation>';
  // slide relationships: rId1 bg, rId(2..1+nOv) overlays, rId(2+nOv) layout
  const layoutRId='rId'+(2+nOv);
  const REL='http://schemas.openxmlformats.org/officeDocument/2006/relationships/';
  let rels='<Relationship Id="rId1" Type="'+REL+'image" Target="../media/image1.png"/>';
  overlays.forEach((o,i)=>{ rels+='<Relationship Id="rId'+(2+i)+'" Type="'+REL+'image" Target="../media/image'+(2+i)+'.png"/>'; });
  rels+='<Relationship Id="'+layoutRId+'" Type="'+REL+'slideLayout" Target="../slideLayouts/slideLayout1.xml"/>';
  const sliderels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+rels+'</Relationships>';
  // spTree: bg, overlay groups, then text boxes
  let body=pptBgPicXml(2, W, H, 'rId1');
  let id=3;
  overlays.forEach((o,i)=>{ body+=pptGroupPicXml(id, id+1, o, 'rId'+(2+i)); id+=2; });
  boxes.forEach(b=>{ body+=pptSpXml(id, b, face); id++; });
  const slide='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main">'
    +'<p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>'
    +'<p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+W+'" cy="'+H+'"/><a:chOff x="0" y="0"/><a:chExt cx="'+W+'" cy="'+H+'"/></a:xfrm></p:grpSpPr>'
    + body
    +'</p:spTree></p:cSld><p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr></p:sld>';
  const zip=new JSZip();
  zip.file('[Content_Types].xml', PPTX_CT);
  zip.folder('_rels').file('.rels', PPTX_ROOTRELS);
  const ppt=zip.folder('ppt');
  ppt.file('presentation.xml', presentation);
  ppt.folder('_rels').file('presentation.xml.rels', PPTX_PRESRELS);
  ppt.folder('theme').file('theme1.xml', PPTX_THEME);
  ppt.folder('slideMasters').file('slideMaster1.xml', PPTX_MASTER);
  ppt.folder('slideMasters').folder('_rels').file('slideMaster1.xml.rels', PPTX_MASTERRELS);
  ppt.folder('slideLayouts').file('slideLayout1.xml', PPTX_LAYOUT);
  ppt.folder('slideLayouts').folder('_rels').file('slideLayout1.xml.rels', PPTX_LAYOUTRELS);
  ppt.folder('slides').file('slide1.xml', slide);
  ppt.folder('slides').folder('_rels').file('slide1.xml.rels', sliderels);
  ppt.folder('media').file('image1.png', bgPng.split(',')[1], {base64:true});
  overlays.forEach((o,i)=>{ ppt.folder('media').file('image'+(2+i)+'.png', o.png.split(',')[1], {base64:true}); });
  const out=await zip.generateAsync({type:'base64'});
  return 'data:application/vnd.openxmlformats-officedocument.presentationml.presentation;base64,'+out;
}

document.getElementById('pptBtn').addEventListener('click',async function(){
  const btn=this, card=document.getElementById('capture');
  if(typeof JSZip==='undefined'){ btn.textContent='ライブラリ読込失敗'; setTimeout(()=>btn.textContent='PPTX（投稿文編集可）',2500); return; }
  const prevT=card.style.transform, prevLabel=btn.textContent;
  btn.disabled=true; btn.textContent='書き出し中…';
  card.style.transform='none'; await raf2();
  const cardRect=card.getBoundingClientRect();
  const w=card.offsetWidth, h=card.offsetHeight;
  // editable text boxes (post bodies for single/thread, plus quoted-tweet text)
  const boxes=[];
  const collectText=(el, extraTop)=>{
    const t=el.textContent; if(!t||!t.trim()) return;
    const r=el.getBoundingClientRect(); const cs=getComputedStyle(el);
    const fpx=parseFloat(cs.fontSize)||14;
    const pl=parseFloat(cs.paddingLeft)||0, pt=parseFloat(cs.paddingTop)||0, pr=parseFloat(cs.paddingRight)||0;
    boxes.push({ x:r.left-cardRect.left+pl, y:r.top-cardRect.top+pt+extraTop, w:Math.max(10,r.width-pl-pr), h:r.height,
      text:t, fpx:fpx, lh:1.15, hex:rgbToHex(cs.color) });
  };
  card.querySelectorAll('.tw-text').forEach(el=>collectText(el, 4));
  card.querySelectorAll('.tw-quote .qtext').forEach(el=>collectText(el, 0));
  // movable overlay groups: post media (image/video) + engagement rows
  const overlays=[]; let overlaysOk=true;
  try{
    let mi=0;
    for(const el of card.querySelectorAll('.tw-media')){
      const r=el.getBoundingClientRect();
      const png=await elementToPNG(el);
      overlays.push({ name:'投稿メディア'+(++mi), png, x:r.left-cardRect.left, y:r.top-cardRect.top, w:r.width, h:r.height });
    }
    let ai=0;
    for(const el of card.querySelectorAll('.tw-actions')){
      const r=el.getBoundingClientRect();
      const png=await elementToPNG(el);
      overlays.push({ name:'エンゲージメント'+(++ai), png, x:r.left-cardRect.left, y:r.top-cardRect.top, w:r.width, h:r.height });
    }
  }catch(e){ console.warn('overlay capture failed; baking into background', e); overlaysOk=false; overlays.length=0; }
  // background layer (hide text, and media/engagement if they became overlays)
  const bgClass = overlaysOk ? 'pptx-bg' : 'hide-text';
  card.classList.add(bgClass); card.classList.add('exporting'); await raf2();
  let png=null;
  try{ png=await nodeToPNG(card, w, h, 3); }catch(e){ console.warn(e); }
  if(!png && typeof html2canvas==='function'){
    try{ png=(await html2canvas(card,{scale:3,backgroundColor:null,useCORS:true,logging:false})).toDataURL('image/png'); }catch(e){ console.error(e); }
  }
  card.classList.remove(bgClass); card.classList.remove('exporting'); card.style.transform=prevT; fitPreview();
  if(!png){ btn.textContent='画像生成に失敗'; setTimeout(()=>btn.textContent=prevLabel,2500); btn.disabled=false; return; }
  try{
    const dataUrl=await buildPptx(png, w, h, boxes, overlays, 'Hiragino Kaku Gothic ProN');
    showSaveModal(dataUrl, 'xpost_McDonaldsJapan_'+state.mode+'.pptx', null);
    btn.textContent='PPTXを生成しました';
    setTimeout(()=>btn.textContent=prevLabel,2000);
  }catch(err){
    console.error(err); btn.textContent='書き出しに失敗';
    setTimeout(()=>btn.textContent=prevLabel,2500);
  }
  btn.disabled=false;
});
